<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <title>Representantes 3A RH - ETEC</title>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-titulo { font-family: 'Archivo Black', sans-serif; }
        
        /* Fundo com padrão sutil de circuitos */
        .bg-etec {
            background-color: #f8fafc;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l30 30-30 30L0 30z' fill='%23005599' fill-opacity='0.03'/%3E%3C/svg%3E");
        }

        /* Moldura circular dupla da foto */
        .photo-frame {
            position: relative;
            padding: 10px;
            border: 2px solid #991200;
            border-radius: 50%;
        }
        
        /* Pontos decorativos nos eixos */
        .dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background-color: #991200;
            border-radius: 50%;
        }
    </style>
</head>
<body class="bg-etec min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-[500px] shadow-2xl flex flex-col overflow-hidden border border-gray-200">
        
        <div class="bg-[#991200] text-white text-center py-3 relative mt-auto items-center shadow-sm">
                <span class="font-bold text-2xl uppercase">ETEC prefeito braz paschoalin</span>
        </div>

        <div class="text-center mt-8 px-39">
            <h1 class="text-[#991200] font-titulo text-2xl sm:text-3xl leading-none uppercase px-4">
                Novos Representantes da Sala — 3ºA RH
            </h1>
        </div>

        <div class="flex flex-col sm:flex-row justify-around items-center gap-10 mt-10 mb-14 px-4">
            
            <div class="flex flex-col items-center">
                <div class="photo-frame">
                    <div class="dot -top-1 left-1/2 -translate-x-1/2"></div>
                    <div class="dot -bottom-1 left-1/2 -translate-x-1/2"></div>
                    <div class="dot top-1/2 -left-1 -translate-y-1/2"></div>
                    <div class="dot top-1/2 -right-1 -translate-y-1/2"></div>
                    
                    <div class="w-32 h-32 sm:w-36 sm:h-36 rounded-full overflow-hidden border-4 border-white shadow-md">
                        <img src="./WhatsApp Image 2026-02-26 at 08.04.59.jpeg" alt="Gustavo Vidal" class="w-full h-full object-cover">
                    </div>
                </div>
                <span class="text-[#991200] font-titulo text-lg mt-4 uppercase">Gustavo Vidal</span>
            </div>

            <div class="flex flex-col items-center">
                <div class="photo-frame">
                    <div class="dot -top-1 left-1/2 -translate-x-1/2"></div>
                    <div class="dot -bottom-1 left-1/2 -translate-x-1/2"></div>
                    <div class="dot top-1/2 -left-1 -translate-y-1/2"></div>
                    <div class="dot top-1/2 -right-1 -translate-y-1/2"></div>

                    <div class="w-32 h-32 sm:w-36 sm:h-36 rounded-full overflow-hidden border-4 border-white shadow-md">
                        <img src="./WhatsApp Image 2026-02-26 at 08.05.21.jpeg" alt="Letícia Luiza" class="w-full h-full object-cover">
                    </div>
                </div>
                <span class="text-[#991200] font-titulo text-lg mt-4 uppercase">Letícia Luiza</span>
            </div>
        </div>

        <div class="bg-[#991200] text-white text-center py-3 relative mt-auto">
            <span class="text-sm font-bold tracking-widest uppercase">Gestão 2026</span>
        </div>
    </div>

</body>
</html>
